# SonarQube / SonarCloud configuration
sonar.projectKey=misw4203_vinilos
sonar.projectName=MISW4203 Vinilos App
sonar.projectVersion=1.0

# SonarCloud: uncomment for SonarCloud
# sonar.organization=your-org-key
sonar.host.url=https://sonarcloud.io

# Source code
sonar.sources=.
sonar.inclusions=**/src/main/**,**/src/main/kotlin/**,**/src/main/java/**
sonar.exclusions=**/src/test/**,**/src/androidTest/**,**/build/**,**/.gradle/**
sonar.tests=**/src/test/**,**/src/androidTest/**

# Binary files
sonar.java.binaries=**/build/intermediates/classes/**,**/build/tmp/kotlin-classes/**

# Test coverage (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml,feature-home/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

# Kotlin rules
sonar.kotlin.detekt.reportPaths=**/build/reports/detekt/detekt.xml

# Android specifics
sonar.android.lint.reportPaths=app/build/reports/lint-results-debug.xml

